<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Ejemplo formulario con JavaScript</title>
        <style>
            .azul { color: blue; }
        </style>
    </head>
<body>
    <form id="formulario">
        Nombre: <input type="text" name="nombre" value="Juan"/>
        <br/>
        Apellido: <input type="text" name="apellido" value="Perez" placeholder="Puto">
        <br/>
    </form>
    <button onclick="mostrarValores()">Mostrar</button>
    <div id="valores"></div>
    
    <script>
        function mostrarValores() {
            let formulario = document.forms['formulario'];
            let texto = '';
            let nombre = formulario['nombre'];
            let apellido = formulario['apellido'];
            /*Lo del placeholder es una estupidez mia solo para recordar que
            a partir de name con . puedo acceder a la info/valor de cualquier
            atributo correspondiente al input*/
            texto = nombre.value + '<br/>' + apellido.placeholder;
            //Este for sirve para recorrer todos los elementos de formulario
            //Y obtener sus valores
            /*for(let elemento of formulario) {
                texto += elemento.value + '<br/>';
            }*/
            //console.log(texto);
            document.getElementById('valores').innerHTML = texto;
        }
    </script>
</body>
</html>
